<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fallowton — Regional Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111008;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'IM Fell English', Georgia, serif;
    padding: 20px;
  }

  h1 {
    color: #b8996e;
    font-size: 1rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.65;
  }

  .map-frame {
    position: relative;
    border: 3px solid #6b4c1e;
    box-shadow:
      0 0 0 5px #1e1005,
      0 0 0 8px #6b4c1e,
      0 0 50px rgba(0,0,0,0.9);
  }

  svg {
    display: block;
    width: min(980px, 97vw);
    height: auto;
  }

  .tooltip {
    position: absolute;
    background: rgba(14,8,2,0.97);
    border: 1px solid #8b6914;
    color: #d4b483;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 0.8rem;
    padding: 8px 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s;
    max-width: 210px;
    line-height: 1.55;
    z-index: 20;
  }
  .tooltip.show { opacity: 1; }
  .tooltip strong { color: #e8c87a; display: block; margin-bottom: 4px; font-size: 0.88rem; }
  .tip-link { display:block; margin-top:5px; padding-top:4px; border-top:1px solid rgba(212,184,112,0.35); color:#d4b050; font-style:italic; font-size:0.72rem; letter-spacing:0.04em; }

  .legend {
    margin-top: 12px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    color: #7a6030;
    font-size: 0.69rem;
    letter-spacing: 0.07em;
    font-style: italic;
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .ld { width: 9px; height: 9px; border-radius: 50%; flex-shrink:0; }
</style>
</head>
<body>
<h1>Fallowton &amp; Surrounding Lands</h1>
<div class="map-frame" id="frame">
<svg viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg" id="svg">
<defs>
  <!-- Parchment texture -->
  <filter id="parch" x="-2%" y="-2%" width="104%" height="104%">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="n"/>
    <feColorMatrix type="saturate" values="0" in="n" result="g"/>
    <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
  </filter>
  <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="2" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="gblue" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feFlood flood-color="#3366dd" flood-opacity="0.7" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="g"/>
    <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="soft">
    <feGaussianBlur stdDeviation="1.2"/>
  </filter>

  <!-- Parchment gradient -->
  <radialGradient id="pg" cx="44%" cy="46%" r="62%">
    <stop offset="0%" stop-color="#ecdcb2"/>
    <stop offset="45%" stop-color="#d8c080"/>
    <stop offset="80%" stop-color="#c2a055"/>
    <stop offset="100%" stop-color="#9a7530"/>
  </radialGradient>
  <!-- Vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="72%">
    <stop offset="55%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(30,14,0,0.6)"/>
  </radialGradient>
  <!-- Hill gradient -->
  <linearGradient id="hillg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#a09060"/>
    <stop offset="100%" stop-color="#c8b080"/>
  </linearGradient>
  <!-- River gradient -->
  <linearGradient id="rivg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#4a7a9a"/>
    <stop offset="50%" stop-color="#6a9ab8"/>
    <stop offset="100%" stop-color="#4a7a9a"/>
  </linearGradient>

  <clipPath id="mc"><rect width="980" height="700"/></clipPath>
  <clipPath id="vc"><ellipse cx="445" cy="352" rx="176" ry="114"/></clipPath>
</defs>

<!-- Cave -->
<ellipse cx="448" cy="228" rx="48" ry="28" fill="transparent" class="poi"
  data-label="The Collapsed Cave"
  data-desc="Rocks on the hill collapsed, revealing a hollow cavern. Inside stands a pale, pyramid-like ancient structure, half exposed and half buried. Blue light leaks from seams in the stone."
  data-link="dungeon-zones.html"/>

<!-- Village overall -->
<ellipse cx="445" cy="352" rx="185" ry="122" fill="transparent" class="poi"
  data-label="Fallowton"
  data-desc="A small walled farming village at the foot of the Old Hill. ~20–30 households. Barley, turnips, rye, gray wheat. One road east. People fear the forest and the hills, and they mistrust the price of anything called 'black craft.'"/>

<!-- Elder's Hall -->
<rect x="468" y="262" width="46" height="42" fill="transparent" class="poi"
  data-label="Elder's Hall"
  data-desc="Elder Bran Orwick holds council here. He wants the cave sealed. 'Nothing good comes from beneath old earth.' Villagers gather here to debate the discovery."
  data-link="elders-hall.html"/>

<!-- Bent Plow Inn -->
<rect x="352" y="263" width="48" height="42" fill="transparent" class="poi"
  data-label="The Bent Plow Inn"
  data-desc="The only inn in Fallowton. Bessa Thorn feeds rain-trapped travelers, hired hands, and the villagers who make rumors. Mordren Vale comes here to listen, but he sleeps in the old west cottage."
  data-link="bent-plow-inn.html"/>

<!-- Shrine -->
<rect x="258" y="320" width="42" height="40" fill="transparent" class="poi"
  data-label="The Village Shrine"
  data-desc="Faith leader Sister Elra tends this roadside shrine. She fears the cave is cursed — 'If old magic is waking, then something holy has failed.' She offers blessings against the black craft."
  data-link="village-shrine.html"/>

<!-- Old Well -->
<circle cx="445" cy="352" r="20" fill="transparent" class="poi"
  data-label="The Old Well"
  data-desc="Village water source. Villagers leave small offerings here against bad luck — a scrap of cloth, a coin, a pinch of ash. Since the cave opened, the water tastes faintly of cold stone."/>

<!-- Grain Store -->
<rect x="522" y="292" width="42" height="38" fill="transparent" class="poi"
  data-label="The Grain Store"
  data-desc="A long barn holding the village's communal grain reserves. The stores are lower than usual this season — some say the strange light from the hill is keeping the barley from setting properly."
  data-link="grain-store.html"/>

<!-- Smith Shed -->
<rect x="479" y="366" width="42" height="38" fill="transparent" class="poi"
  data-label="The Smith Shed"
  data-desc="Tamsin Bellows hammers out tools, weapons, door bars, and small crank-driven devices here. She sells metalwork, not comfort. 'Better iron than prayers,' she says."
  data-link="smith-shed.html"/>

<!-- Wizard's Cottage -->
<rect x="297" y="373" width="44" height="40" fill="transparent" class="poi"
  data-label="The Wizard's Cottage"
  data-desc="A small, strange-smelling cottage on the village's west side. Mordren Vale rented it after arriving three days after the sinkhole opened. Locals keep their distance."
  data-link="wizards-cottage.html"/>

<!-- Mill Shed -->
<rect x="625" y="360" width="44" height="40" fill="transparent" class="poi"
  data-label="The Mill Shed"
  data-desc="A waterwheel mill just outside the east gate, drawing power from a side channel of Greywater Beck. The miller works long hours and has little time for village gossip — but he watches the hill."
  data-link="mill-shed.html"/>

<!-- Forest -->
<rect x="0" y="200" width="240" height="290" fill="transparent" class="poi"
  data-label="The Blackwood"
  data-desc="The dark forest stretching west and south. No one enters willingly. Locals say: 'Old roots, old teeth.' Some nights, lights move between the trees."/>

<!-- River -->
<rect x="780" y="80" width="45" height="450" fill="transparent" class="poi"
  data-label="Greywater Beck (The Mill Run)"
  data-desc="The river east of Fallowton. Good fishing but not traveled at night. The bridge is the only crossing — travelers must pass through Fallowton to reach the eastern plains."/>

<!-- Bridge -->
<rect x="782" y="346" width="38" height="30" fill="transparent" class="poi"
  data-label="Mill Bridge"
  data-desc="A stone arch bridge over Greywater Beck. Built before living memory. The only crossing. The road continues east toward distant towns. Most travelers never return to Fallowton."/>

<!-- Hills -->
<rect x="240" y="0" width="540" height="195" fill="transparent" class="poi"
  data-label="The Old Hill"
  data-desc="The hill directly north of Fallowton. Villagers fear it deeply — they call it 'the old hill that remembers.' The recent rockfall revealed a cave with an ancient structure, and at night blue light leaks from the broken earth."/>

<script>
const tip = document.getElementById('tip');
const frame = document.getElementById('frame');

document.querySelectorAll('.poi').forEach(el => {
  const hasLink = !!el.dataset.link;
  el.style.cursor = hasLink ? 'pointer' : 'help';

  el.addEventListener('mousemove', e => {
    const r = frame.getBoundingClientRect();
    let x = e.clientX - r.left + 16;
    let y = e.clientY - r.top - 10;
    if (x + 220 > r.width) x = e.clientX - r.left - 234;
    const hint = hasLink ? '<span class="tip-link">↵ click to enter</span>' : '';
    tip.innerHTML = `<strong>${el.dataset.label}</strong>${el.dataset.desc}${hint}`;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
    tip.classList.add('show');
  });
  el.addEventListener('mouseleave', () => tip.classList.remove('show'));
  if (hasLink) {
    el.addEventListener('click', () => { window.location.href = el.dataset.link; });
  }
});
</script>
</body>
</html>
